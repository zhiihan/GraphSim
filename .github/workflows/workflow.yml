name: Build Wheels

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Reduced to OS only. cibuildwheel handles Python 3.10, 3.11, 3.12 internally.
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build wheels
        # Using the official action is more robust than "pip install cibuildwheel"
        uses: pypa/cibuildwheel@v2.21.3
        env:
          # Define which versions you want here
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          # Optional: Skip 32-bit builds to save time
          CIBW_SKIP: "*-win32 *-manylinux_i686"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          # v4 REQUIREMENT: Name must be unique for each matrix job
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl