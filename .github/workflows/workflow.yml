name: Build Wheels

on:
  push:
    branches: [ main ]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs: # <--- CRITICAL: All jobs must be under this key
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_ENVIRONMENT_WINDOWS: "UV_LINK_MODE=copy TMPDIR='C:\\temp' TEMP='C:\\temp' TMP='C:\\temp'"
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686"
          CIBW_CONFIG_SETTINGS: "cmake.define.Python_EXECUTABLE={python}"
          CIBW_BEFORE_BUILD_WINDOWS: "if not exist C:\\temp mkdir C:\\temp"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          # Using job-index ensures uniqueness across the matrix
          name: cibw-wheels-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  publish:
    needs: [build_wheels]
    runs-on: ubuntu-latest
    # This checks if the workflow was triggered by a release
    if: >-
      (github.event_name == 'release' && github.event.action == 'published') ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          # This pattern matches all "cibw-wheels-*" artifacts and merges them
          pattern: cibw-wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}